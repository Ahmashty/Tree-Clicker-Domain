<!DOCTYPE html>
<html lang="de">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4424018674779732"
     crossorigin="anonymous"></script>
    <link rel="apple-touch-icon" href="cookie.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tree Clicker">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Tree Clicker | Das ultimative Klick-Abenteuer</title>
    <meta name="description" content="Pflanze virtuelle Bäume, schalte magische Upgrades frei und werde der größte Baum-Tycoon, ähnlich wie cookie clicker.Das Perfekte Spiel wenn die langweilig ist! Kostenlos spielen!">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            text-align: center; font-family: 'Segoe UI', Arial, sans-serif; background: #e8f5e9;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
            user-select: none; touch-action: none;
        }
        .left { flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #c8e6c9; border-right: 5px solid #2e7d32; }
        .right { flex: 1; background: white; padding: 20px; overflow-y: auto; text-align: left; box-shadow: -2px 0 10px rgba(0,0,0,0.1); }
        
        #score-display { font-size: 42px; font-weight: bold; color: #1b5e20; }
        
        #click-target {
            width: 250px; height: 250px; background: #4caf50; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative; -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        #tree-img { width: 230px; height: 230px; pointer-events: none; }
        #click-target:active { transform: scale(0.85); }
        
        .shop-item {
            border: 2px solid #4caf50; border-radius: 12px; padding: 12px;
            margin-bottom: 12px; background: #f1f8e9; cursor: pointer;
        }
        .shop-item.disabled { opacity: 0.4; cursor: not-allowed; border-color: #ccc; }
        
        .particle { position: absolute; pointer-events: none; font-weight: bold; font-size: 32px; color: #1b5e20; animation: up 0.8s forwards; }
        @keyframes up { 0% {transform: translateY(0); opacity:1;} 100% {transform: translateY(-120px); opacity:0;} }
        
        .btn-green { background: #2e7d32; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; width: 150px; }
        .btn-blue { background: #1976d2; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; width: 150px; }
        
        /* Modal für Statistiken */
        #stats-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;
        }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 80%; max-width: 400px; text-align: left; position: relative; }
    </style>
</head>
<body>

    <div class="left">
        <div id="score-display">0 🌳</div>
        <p id="tool-text" style="font-weight: bold;">Werkzeug: Hände ✋</p>
        
        <div id="click-target" onpointerdown="doClick(event)">
            <img id="tree-img" src="cookie.png" alt="KLICK">
        </div>
        
        <p>Stärke: <span id="ui-pow">1</span> | PPS: <span id="ui-pps">0</span></p>
        
        <button class="btn-blue" onclick="toggleStats()">Statistiken 📊</button>
        <button class="btn-green" onclick="shareGame()">Teilen 📤</button>
        <button onclick="if(confirm('Fortschritt löschen?')){localStorage.clear(); location.reload();}" style="margin-top:20px; font-size:10px; opacity:0.3;">Spielstand zurücksetzen</button>
    </div>

    <div class="right">
        <h2>Shop 🛒</h2>
        <div id="shop-container"></div>
    </div>

    <div id="stats-modal" onclick="if(event.target == this) toggleStats()">
        <div class="modal-content">
            <h2 style="color:#2e7d32; margin-top:0;">Deine Erfolge 🏆</h2>
            <p>Klicks insgesamt: <b id="stat-clicks">0</b></p>
            <p>Bäume insgesamt: <b id="stat-total">0</b></p>
            <p>Spielzeit: <b id="stat-time">0</b> Min.</p>
            <p>Max. Klick-Stärke: <b id="stat-pow">0</b></p>
            <button class="btn-green" style="width:100%" onclick="toggleStats()">Schließen</button>
        </div>
    </div>

    <script>
        // SOUNDS
        const clickAudio = new Audio('click.mp3');
        const buyAudio = new Audio('kaching.mp3');

        // VARIABLEN
        let score = 0;
        let clickPower = 1;
        let toolIdx = 0;
        
        // STATISTIKEN
        let totalClicks = 0;
        let totalEarnings = 0;
        let startTime = Date.now();

        const tools = [
            {n: "Handschuhe", s: "🧤", p: 5, c: 20},
            {n: "Spaten", s: "🦯", p: 25, c: 500},
            {n: "Axt", s: "🪓", p: 150, c: 5000},
            {n: "Traktor", s: "🚜", p: 1200, c: 100000},
            {n: "Laser", s: "⚡", p: 10000, c: 2000000}
        ];

        const buildings = [
            {n: "Wurm", s: "🪱", p: 1, c: 50, count: 0},
            {n: "Dünger", s: "🧪", p: 12, c: 800, count: 0},
            {n: "Gärtner", s: "👨‍🌾", p: 60, c: 8000, count: 0},
            {n: "Fabrik", s: "🏭", p: 800, c: 150000, count: 0},
            {n: "Galaxie", s: "🌌", p: 35000, c: 10000000, count: 0}
        ];

        function doClick(e) {
            if(e) e.preventDefault();
            
            // Statistiken hochzählen
            totalClicks += 1;
            totalEarnings += clickPower;
            
            clickAudio.play().catch(() => {}); 
            score += clickPower;
            
            // Partikel
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = (e.clientX || 150) + "px";
            p.style.top = (e.clientY || 150) + "px";
            p.innerText = "+" + Math.floor(clickPower).toLocaleString();
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            
            update();
            save();
        }

        function buildShop() {
            let html = `<h3>Werkzeuge</h3><div id="tool-btn" class="shop-item" onclick="buyTool()"><b id="tool-name"></b><br><span id="tool-cost"></span></div><h3>Gebäude</h3>`;
            buildings.forEach((b, i) => {
                html += `<div id="b-${i}" class="shop-item" onclick="buyB(${i})"><b>${b.n} ${b.s} (+${b.p}/s)</b><br><span id="bc-${i}"></span></div>`;
            });
            document.getElementById("shop-container").innerHTML = html;
        }

        function buyTool() {
            let t = tools[toolIdx];
            if(t && score >= t.c) {
                score -= t.c;
                clickPower += t.p;
                toolIdx++;
                buyAudio.play().catch(() => {});
                update(); save();
            }
        }

        function buyB(i) {
            let b = buildings[i];
            if(score >= b.c) {
                score -= b.c;
                b.count++;
                b.c = Math.round(b.c * 1.3);
                buyAudio.play().catch(() => {});
                update(); save();
            }
        }

        function update() {
            document.getElementById("score-display").innerText = Math.floor(score).toLocaleString() + " 🌳";
            document.getElementById("ui-pow").innerText = Math.floor(clickPower).toLocaleString();
            
            const t = tools[toolIdx];
            const tBtn = document.getElementById("tool-btn");
            if(t) {
                document.getElementById("tool-name").innerText = "Upgrade: " + t.n + " " + t.s;
                document.getElementById("tool-cost").innerText = "Kosten: " + t.c.toLocaleString();
                tBtn.classList.toggle("disabled", score < t.c);
            } else {
                document.getElementById("tool-name").innerText = "Max Level erreicht!";
                tBtn.classList.add("disabled");
            }

            let pps = 0;
            buildings.forEach((b, i) => {
                pps += b.count * b.p;
                document.getElementById("bc-" + i).innerText = `Kosten: ${b.c.toLocaleString()} (Besitz: ${b.count})`;
                document.getElementById("b-" + i).classList.toggle("disabled", score < b.c);
            });
            document.getElementById("ui-pps").innerText = pps.toLocaleString();
        }

        function toggleStats() {
            const modal = document.getElementById('stats-modal');
            if(modal.style.display === 'none' || modal.style.display === '') {
                document.getElementById('stat-clicks').innerText = totalClicks.toLocaleString();
                document.getElementById('stat-total').innerText = Math.floor(totalEarnings).toLocaleString();
                document.getElementById('stat-pow').innerText = Math.floor(clickPower).toLocaleString();
                const mins = Math.floor((Date.now() - startTime) / 60000);
                document.getElementById('stat-time').innerText = mins;
                modal.style.display = 'flex';
            } else {
                modal.style.display = 'none';
            }
        }

        function shareGame() {
            const text = `Ich habe schon ${Math.floor(totalEarnings).toLocaleString()} Bäume gepflanzt! Schaffst du mehr?`;
            if (navigator.share) {
                navigator.share({ title: 'Tree Clicker', text: text, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link kopiert! 🌳");
            }
        }

        function save() {
            const data = { s: score, cp: clickPower, ti: toolIdx, b: buildings, tc: totalClicks, te: totalEarnings, st: startTime };
            localStorage.setItem("tree_save_stats_v3", JSON.stringify(data));
        }

        function load() {
            const saved = localStorage.getItem("tree_save_stats_v3");
            if(saved) {
                const d = JSON.parse(saved);
                score = d.s || 0;
                clickPower = d.cp || 1;
                toolIdx = d.ti || 0;
                totalClicks = d.tc || 0;
                totalEarnings = d.te || 0;
                startTime = d.st || Date.now();
                if(d.b) d.b.forEach((savedB, i) => {
                    if(buildings[i]) { buildings[i].count = savedB.count; buildings[i].c = savedB.c; }
                });
            }
        }

        buildShop(); load(); update();
        setInterval(() => {
            let pps = 0; buildings.forEach(b => pps += b.count * b.p);
            if(pps > 0) { 
                score += pps; 
                totalEarnings += pps; // Auch PPS zählen zur Gesamtstatistik
                update(); 
                save();
            }
        }, 1000);
    </script>
</body>
</html>
